# 32-profile binary pilot (ConstructionPlan §H.1 Phase 0).
# NOTE: With full BFI + ER + TRAIT, this runs ~4000+ API calls per model.
# Start small (--override-personas true to limit count) before scaling up.
experiment_id: phase0_pilot_32types
description: "All 2^5 = 32 high/low binary profiles, amplitude ±2 on a 1-5 scale (Serapio-Garcia)."
language: ja
primary_model: openai:gpt-4.1
judge_models:
  - openai:gpt-4.1
n_reps: 1
seed_base: 42
max_concurrency: 15
run_bfi: true
run_expert_rating: false
run_trait_mcq: true
output_dir: ./results
log_dir: ./logs

bfi_items_filename: "bfi_ja.json"

# Personas will be auto-generated by scripts/run_pilot_32.py using
# generate_32_profiles(). This YAML serves as the defaults only.
personas: []
